apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing{{.Values.nsId}}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /pod{{.Values.nsId}}
            pathType: Prefix
            backend:
              service:
                name: pod{{.Values.nsId}}-svc
                port:
                  number: 80
          - path: /deploy{{.Values.nsId}}
            pathType: Prefix
            backend:
              service:
                name: deploy{{.Values.nsId}}-svc
                port:
                  number: 80
