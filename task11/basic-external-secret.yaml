apiVersion: external-secrets.io/v1
kind: ExternalSecret # 這個是用於連接外部的 secret (這邊我用的是 aws)
metadata:
  name: aws-secret
spec:
  refreshInterval: 1h
  secretStoreRef: # 指令要用哪個 SecretStore 來取得來連接 aws
    name: aws-secret-store
    kind: SecretStore
  target:
    name: k8s-secrets # ESO 同步完成後，要在 k8s 裡建立的 Secret 的名稱
    creationPolicy: Owner
  data:
    - secretKey: k8s-aws-secrets # 寫入 k8s secret 的 key 的名稱
      remoteRef:
        key: k8s-aws-secrets # AWS secret manager 上的 secret 名稱
