# task5 deployment -> nginx service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task5-nginx-deployment
  labels:
    app: task5
spec:
  replicas: ${replicas_number}
  selector:
    matchLabels:
      app: task5-nginx
  template:
    metadata:
      labels:
        app: task5-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "server { listen 80; location / { return 200 'Pod: $POD_NAME\n'; add_header Content-Type text/plain; } }" > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
