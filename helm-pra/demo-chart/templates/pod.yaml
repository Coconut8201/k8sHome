apiVersion: v1
kind: Pod
metadata:
  name: pod{{.Values.nsId}}
  labels:
    app: pod{{.Values.nsId}}
spec:
  containers:
    - name: k8s-demo-app
      image: jasonmel/k8s-demo-app:latest
      env:
        - name: MESSAGE
          value: "Hello from pod"
        - name: USERNAME
          valueFrom:
            configMapKeyRef:
              name: cm{{.Values.nsId}}
              key: USERNAME
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: secret{{.Values.nsId}}
              key: PASSWORD
      ports:
        - containerPort: 80
