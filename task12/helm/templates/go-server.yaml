apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-server
  template:
    metadata:
      labels:
        app: go-server
    spec:
      containers:
        - name: go-server
          image: coconut820/go-server:latest
          imagePullPolicy: IfNotPresent # ← 本地 image 一定要加這個！
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: vault-k8s-secrets
